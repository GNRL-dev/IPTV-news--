<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My IPTV Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 300px;
      background: #111;
      color: white;
      overflow-y: auto;
      transition: 0.3s;
    }

    #sidebar.hidden {
      width: 0;
      overflow: hidden;
    }

    #search {
      width: 90%;
      margin: 10px;
      padding: 8px;
      border: none;
      border-radius: 5px;
    }

    #channels li {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    #channels li:hover {
      background: #333;
    }

    #main {
      flex: 1;
      background: black;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
    }

    #toggleBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <input type="text" id="search" placeholder="Search...">
  <ul id="channels"></ul>
</div>

<div id="main">
  <button id="toggleBtn">☰</button>
  <video id="video" controls autoplay></video>
</div>

<script>
const playlistUrl = "https://raw.githubusercontent.com/GNRL-dev/IPTV-news--/refs/heads/main/News-ar.m3u8";

let allChannels = [];

async function loadPlaylist() {
  const res = await fetch(playlistUrl);
  const text = await res.text();
  const lines = text.split("\n");

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith("#EXTINF")) {
      const name = lines[i].split(",")[1];
      const stream = lines[i + 1];
      allChannels.push({ name, stream });
    }
  }

  displayChannels(allChannels);
}

function displayChannels(list) {
  const ul = document.getElementById("channels");
  ul.innerHTML = "";

  list.forEach(ch => {
    const li = document.createElement("li");
    li.textContent = ch.name;

    li.onclick = () => playStream(ch.stream);

    ul.appendChild(li);
  });
}

function playStream(url) {
  const video = document.getElementById("video");

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }

  // auto hide sidebar
  document.getElementById("sidebar").classList.add("hidden");
}

// search filter
document.getElementById("search").addEventListener("input", function () {
  const term = this.value.toLowerCase();
  const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
  displayChannels(filtered);
});

// toggle sidebar
document.getElementById("toggleBtn").onclick = () => {
  document.getElementById("sidebar").classList.toggle("hidden");
};

loadPlaylist();
</script>

</body>
</html>
