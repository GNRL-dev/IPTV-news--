<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Light IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
  background: #f5f5f5;
}

#sidebar {
  width: 300px;
  background: #ffffff;
  border-right:1px solid #ddd;
  overflow-y:auto;
  transition: 0.3s;
}

#sidebar.hidden {
  width: 0;
  overflow: hidden;
}

#search {
  width: 90%;
  margin: 10px;
  padding: 10px;
  border:1px solid #ccc;
  border-radius: 8px;
}

#channels {
  list-style:none;
  padding:0;
  margin:0;
}

#channels li {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  cursor:pointer;
  border-bottom:1px solid #eee;
  transition: background 0.2s;
}

#channels li:hover {
  background:#e0e0e0;
}

#channels li.selected {
  background:#cce5ff;
}

.logo {
  width:36px;
  height:36px;
  object-fit: contain;
}

#main {
  flex:1;
  position:relative;
  background:black;
}

video {
  width:100%;
  height:100%;
}

#toggleBtn {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  padding:10px;
  border:none;
  background: rgba(255,255,255,0.7);
  cursor:pointer;
  border-radius:6px;
}

#startOverlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  cursor:pointer;
  z-index:999;
}
</style>
</head>

<body>

<div id="sidebar">
  <input type="text" id="search" placeholder="Search channels...">
  <ul id="channels"></ul>
</div>

<div id="main">
  <button id="toggleBtn">☰</button>
  <video id="video" controls autoplay muted></video>
  <div id="startOverlay">Click anywhere to start video</div>
</div>

<script>
const playlistUrl = "https://raw.githubusercontent.com/GNRL-dev/IPTV-news--/refs/heads/main/News-ar.m3u8";
let allChannels = [];
let hls;
let selectedIndex = 0;
const video = document.getElementById("video");
const overlay = document.getElementById("startOverlay");

// Load playlist
async function loadPlaylist() {
  const res = await fetch(playlistUrl);
  const text = await res.text();
  const lines = text.split("\n");

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith("#EXTINF")) {
      const info = lines[i];
      const name = info.split(",")[1];
      const logoMatch = info.match(/tvg-logo="(.*?)"/);
      const logo = logoMatch ? logoMatch[1] : "";
      const stream = lines[i+1];
      allChannels.push({ name, stream, logo });
    }
  }
  displayChannels(allChannels);
}

// Display channels
function displayChannels(list) {
  const ul = document.getElementById("channels");
  ul.innerHTML = "";

  list.forEach((ch, index) => {
    const li = document.createElement("li");
    li.dataset.index = index;

    // Number
    const num = document.createElement("span");
    num.textContent = (index+1) + ".";
    num.style.width = "24px";
    num.style.fontWeight = "bold";
    li.appendChild(num);

    // Logo
    if (ch.logo) {
      const img = document.createElement("img");
      img.src = ch.logo;
      img.className = "logo";
      li.appendChild(img);
    }

    // Name
    const name = document.createElement("span");
    name.textContent = ch.name;
    name.style.flex = "1";
    li.appendChild(name);

    // Click to play immediately
    li.onclick = () => selectChannel(index);
    ul.appendChild(li);
  });
}

// Play channel
function playStream(url) {
  if (hls) { hls.destroy(); }

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(err => console.log("Autoplay blocked?", err));
    });
  } else {
    video.src = url;
    video.play().catch(err => console.log("Autoplay blocked?", err));
  }

  document.getElementById("sidebar").classList.add("hidden");
}

// Highlight selected channel
function selectChannel(index) {
  selectedIndex = index;
  const items = document.querySelectorAll("#channels li");
  items.forEach(item => item.classList.remove("selected"));
  const selectedItem = items[index];
  if(selectedItem){
    selectedItem.classList.add("selected");
    selectedItem.scrollIntoView({behavior:"smooth", block:"center"});
    playStream(allChannels[index].stream);
  }
}

// Search
document.getElementById("search").addEventListener("input", function(){
  const term = this.value.toLowerCase();
  const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
  displayChannels(filtered);
});

// Toggle sidebar
document.getElementById("toggleBtn").onclick = () => {
  document.getElementById("sidebar").classList.toggle("hidden");
};

// Arrow key navigation
document.addEventListener("keydown", (e) => {
  if(e.key === "ArrowDown"){
    if(selectedIndex < allChannels.length -1) selectChannel(selectedIndex+1);
  }
  if(e.key === "ArrowUp"){
    if(selectedIndex > 0) selectChannel(selectedIndex-1);
  }
});

// Check if autoplay is allowed
async function checkAutoplay() {
  try {
    await video.play();
    overlay.style.display = "none";
  } catch(err) {
    overlay.style.display = "flex";
    console.log("Autoplay blocked, waiting for user click to start");
  }
}

// Remove overlay on click
overlay.onclick = () => {
  overlay.style.display = "none";
  video.muted = false; // enable sound
  video.play();
};

loadPlaylist();
checkAutoplay();
</script>

</body>
</html>
