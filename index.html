<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Light IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
}

#sidebar {
  width:300px;
  background:#fff;
  border-right:1px solid #ddd;
  overflow-y:auto;
}

#search {
  width:90%;
  margin:10px;
  padding:10px;
}

#channels li {
  padding:8px;
  cursor:pointer;
}

#channels li.selected {
  background:#cce5ff;
}

#main {
  flex:1;
  background:black;
  position:relative;
}

video, iframe {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="sidebar">
  <input id="search" placeholder="Search">
  <ul id="channels"></ul>
</div>

<div id="main">
  <video id="video" controls autoplay></video>
  <iframe id="ytPlayer" style="display:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<script>
const playlistUrl = "https://raw.githubusercontent.com/GNRL-dev/IPTV-news--/refs/heads/main/News-ar.m3u8";

let allChannels = [];
let hls, dashPlayer;
let selectedIndex = 0;

// ===== LOAD PLAYLIST =====
async function loadPlaylist(){
  const res = await fetch(playlistUrl);
  const text = await res.text();
  const lines = text.split("\n");

  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("#EXTINF")){
      const name = lines[i].split(",")[1];
      const stream = lines[i+1];
      allChannels.push({name, stream});
    }
  }

  displayChannels(allChannels);
  selectChannel(0);
}

// ===== DISPLAY =====
function displayChannels(list){
  const ul = document.getElementById("channels");
  ul.innerHTML = "";

  list.forEach((ch,i)=>{
    const li = document.createElement("li");
    li.textContent = (i+1)+". "+ch.name;
    li.onclick = ()=>selectChannel(i);
    ul.appendChild(li);
  });
}

// ===== HELPERS =====
function isYouTube(url){
  return url.includes("youtube.com") || url.includes("youtu.be");
}

function isDASH(url){
  return url.endsWith(".mpd");
}

function extractYouTubeID(url){
  let m = url.match(/v=([^&]+)/);
  if(m) return m[1];

  m = url.match(/youtu\.be\/([^?]+)/);
  if(m) return m[1];

  m = url.match(/live\/([^?]+)/);
  if(m) return m[1];

  return null;
}

// 🔥 محاولة الحصول على videoId
async function getLiveVideoId(url){
  try{
    const res = await fetch(url);
    const text = await res.text();

    let match;
    match = text.match(/"videoId":"([^"]+)"/);
    if(match) return match[1];

    match = text.match(/"canonicalBaseUrl":"\/watch\?v=([^"]+)"/);
    if(match) return match[1];

    match = text.match(/\/watch\?v=([a-zA-Z0-9_-]{11})/);
    if(match) return match[1];

  }catch(e){
    console.log("YT fetch error:", e);
  }

  return null;
}

// ===== PLAY =====
async function playStream(url){
  const video = document.getElementById("video");
  const iframe = document.getElementById("ytPlayer");

  iframe.style.display="none";
  iframe.src="";

  if(hls){hls.destroy();hls=null;}
  if(dashPlayer){dashPlayer.reset();dashPlayer=null;}

  // ===== YOUTUBE =====
  if(isYouTube(url)){
    video.style.display="none";
    iframe.style.display="block";

    let id = extractYouTubeID(url);

    // إذا الرابط @channel/live
    if(!id && url.includes("@")){
      id = await getLiveVideoId(url);
    }

    // إذا لم نجد videoId → افتح الرابط مباشرة
    if(!id){
      console.log("No videoId found, opening page directly");
      iframe.src = url;
      return;
    }

    iframe.src = "https://www.youtube.com/embed/"+id+"?autoplay=1&mute=1";
    return;
  }

  // ===== DASH =====
  if(isDASH(url)){
    video.style.display="block";
    dashPlayer = dashjs.MediaPlayer().create();
    dashPlayer.initialize(video, url, true);
    return;
  }

  // ===== HLS =====
  video.style.display="block";
  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}

// ===== SELECT =====
function selectChannel(i){
  selectedIndex = i;

  document.querySelectorAll("#channels li")
    .forEach(el=>el.classList.remove("selected"));

  const item = document.querySelectorAll("#channels li")[i];
  if(item){
    item.classList.add("selected");
    playStream(allChannels[i].stream);
  }
}

// ===== SEARCH =====
document.getElementById("search").oninput = function(){
  const t = this.value.toLowerCase();
  displayChannels(allChannels.filter(c=>c.name.toLowerCase().includes(t)));
};

// START
loadPlaylist();
</script>

</body>
</html>
